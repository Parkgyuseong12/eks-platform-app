name: CI - Build and Push to ECR

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yaml'

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: eks-platform-dev-blog
  MANIFESTS_REPO: Parkgyuseong12/eks-platform-manifests

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
            app/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.IMAGE_TAG }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Update manifests repo image tag
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.MANIFESTS_REPO }}.git manifests
          cd manifests
          sed -i "s|image: .*eks-platform-dev-blog.*|image: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.IMAGE_TAG }}|" apps/deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --staged --quiet || (git commit -m "chore: update image tag to ${{ steps.tag.outputs.IMAGE_TAG }}" && git push)
